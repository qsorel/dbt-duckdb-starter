version: 2

models:
  - name: dim_sponsors
    description: >
      Sponsor dimension table. One row per pharmaceutical company
      that funds clinical trials on the platform.
    columns:
      - name: sponsor_id
        description: Primary key. Unique identifier for the sponsor (e.g. sp_001).
      - name: sponsor_name
        description: Display name of the pharmaceutical company (e.g. Sanofi, Moderna).
      - name: created_at
        description: Timestamp when the sponsor record was first created.
