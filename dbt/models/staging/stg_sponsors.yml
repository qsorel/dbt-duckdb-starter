version: 2

models:
  - name: stg_sponsors
    description: Staged sponsors data from the raw sponsors seed.
    columns:
      - name: sponsor_id
        description: Unique identifier for the sponsor (e.g. sp_001).
        tests:
          - unique
          - not_null
      - name: sponsor_name
        description: Display name of the pharmaceutical company sponsoring trials.
      - name: created_at
        description: Timestamp when the sponsor record was first created.
